<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Logic Monitor V4.0 - No Scroll Edition</title>
    <style>
        :root {
            --bg-color: #020617;
            --card-bg: #0f172a;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
            --accent: #38bdf8;
            --border-color: #334155;
        }

        /* 強制鎖死視窗大小，禁止滾動 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            padding: 2vh 2vw; /* 保留邊界呼吸空間 */
        }

        *, *::before, *::after {
            box-sizing: inherit;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 2vh;
            box-shadow: 0 0 5vh rgba(0, 0, 0, 0.8);
            width: 100%;
            height: 100%;
            border: 0.3vh solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 2vh 3vw;
        }

        /* 標題區自動適應高度 */
        .header-section {
            flex-shrink: 0; /* 防止被擠壓 */
            text-align: center;
            margin-bottom: 1.5vh;
        }

        h1 {
            font-size: 3.5vh;
            margin: 0 0 0.5vh 0;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.3vw;
        }

        .subtitle {
            font-size: 1.6vh;
            color: var(--text-secondary);
            margin: 0;
            font-weight: 500;
        }

        /* 狀態燈號區 */
        .status-header {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 1.5vh;
        }

        .status-light {
            width: 9vh;
            height: 9vh;
            border-radius: 50%;
            background-color: var(--danger);
            box-shadow: 0 0 3vh var(--danger);
            transition: all 0.4s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            font-size: 1.6vh;
            letter-spacing: 1px;
            color: #fff;
        }

        .status-light.green {
            background-color: var(--success);
            box-shadow: 0 0 4vh var(--success);
            color: #000;
        }

        .progress-text {
            font-size: 2vh;
            font-weight: bold;
            color: var(--text-secondary);
            margin-top: 1vh;
        }

        /* 左右雙欄位佈局，填滿剩餘空間 */
        .grid-container {
            flex-grow: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2vw;
            min-height: 0; /* 讓 Grid 內容能正確縮小 */
        }

        .column-title {
            font-size: 2.2vh;
            color: var(--accent);
            margin: 0 0 1vh 0;
            padding-bottom: 0.5vh;
            border-bottom: 0.2vh solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 0.5vw;
        }

        .check-group {
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* 均勻分佈垂直空間 */
            height: 100%;
        }

        .check-item {
            display: flex;
            align-items: flex-start;
            gap: 1vw;
            padding: 1.2vh 1vw;
            background: #1e293b;
            border-radius: 1vh;
            cursor: pointer;
            transition: all 0.2s;
            border: 0.15vh solid transparent;
            flex-grow: 1;
            margin-bottom: 0.8vh;
        }

        .check-item:last-child {
            margin-bottom: 0;
        }

        .check-item:hover {
            border-color: var(--accent);
            background: #283548;
        }

        .check-item input {
            width: 3vh;
            height: 3vh;
            margin-top: 0.2vh;
            cursor: pointer;
            accent-color: var(--success);
            flex-shrink: 0;
        }

        .check-label {
            font-size: 1.8vh;
            font-weight: 700;
            line-height: 1.3;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .check-label span {
            font-size: 1.3vh;
            color: var(--text-secondary);
            font-weight: normal;
            margin-top: 0.4vh;
            line-height: 1.4;
        }

        .highlight {
            color: var(--warning);
            font-weight: bold;
        }

        .danger-text {
            color: var(--danger);
            font-weight: bold;
        }

        /* 底部按鈕區 */
        #action-btn {
            flex-shrink: 0;
            width: 100%;
            height: 8vh;
            margin-top: 1.5vh;
            border-radius: 1.5vh;
            border: none;
            font-weight: 900;
            font-size: 2.5vh;
            cursor: not-allowed;
            background-color: #334155;
            color: #64748b;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.2vw;
        }

        #action-btn.active {
            background-color: var(--success);
            color: #020617;
            cursor: pointer;
            box-shadow: 0 1vh 3vh rgba(34, 197, 94, 0.4);
        }

        /* 極端寬螢幕防護 */
        @media (min-aspect-ratio: 2/1) {
            .container {
                width: 80vw;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <h1>System Override: 10-Point Verification</h1>
        <p class="subtitle">完美通關協議：心態與戰術的絕對同步 (全局視角鎖定)</p>
    </div>

    <div class="status-header">
        <div id="statusLight" class="status-light">LOCKED</div>
        <div class="progress-text">系統解鎖進度：<span id="counter">0</span> / 10</div>
    </div>

    <div class="grid-container">
        <!-- 左側：心態與防禦 -->
        <div class="check-group">
            <h2 class="column-title">🛡️ 左大腦：心態防禦</h2>

            <label class="check-item">
                <input type="checkbox" class="monitor-check">
                <div class="check-label">
                    1. 抹除生理熱情 (Dopamine Zero)
                    <span>心跳平穩。沒有「想贏錢」的興奮感，只有執行 SOP 的枯燥。</span>
                </div>
            </label>

            <label class="check-item">
                <input type="checkbox" class="monitor-check">
                <div class="check-label">
                    2. 拒絕報復交易 (No Revenge)
                    <span>已接受先前虧損為沉沒成本，絕無「把錢贏回來」的念頭。</span>
                </div>
            </label>

            <label class="check-item">
                <input type="checkbox" class="monitor-check">
                <div class="check-label">
                    3. 單日生存底線 (Daily Loss Limit)
                    <span>今日虧損尚未超過 <span class="highlight">$300</span>。若觸及將無條件關機。</span>
                </div>
            </label>

            <label class="check-item">
                <input type="checkbox" class="monitor-check">
                <div class="check-label">
                    4. 接受停損事實 (Acceptance of Risk)
                    <span>心理上 100% 接受可能虧損 $100。打到停損絕不「受不了」。</span>
                </div>
            </label>

            <label class="check-item">
                <input type="checkbox" class="monitor-check">
                <div class="check-label">
                    5. 捍衛總資產 (700K Firewall)
                    <span>清楚知道正保衛總資產安全。<span class="danger-text">我是資產管理者，不是賭徒。</span></span>
                </div>
            </label>
        </div>

        <!-- 右側：戰術與執行 -->
        <div class="check-group">
            <h2 class="column-title">⚔️ 右大腦：戰術邊界</h2>

            <label class="check-item">
                <input type="checkbox" class="monitor-check">
                <div class="check-label">
                    6. 封印 1 分 K 線 (Timeframe Lock)
                    <span>徹底關閉 1分K。主觀圖表鎖定在 <span class="highlight">15分K 或 60分K</span>。</span>
                </div>
            </label>

            <label class="check-item">
                <input type="checkbox" class="monitor-check">
                <div class="check-label">
                    7. 大刻度邊界 (Major Boundary)
                    <span>價格達大刻度(4H/1H)關鍵支撐壓力位。不在半山腰進場。</span>
                </div>
            </label>

            <label class="check-item">
                <input type="checkbox" class="monitor-check">
                <div class="check-label">
                    8. 破底翻 / 回踩確認 (Pattern Trigger)
                    <span>出現明確的「假突破拉回」或「突破後縮量回踩」。<span class="danger-text">絕不追價。</span></span>
                </div>
            </label>

            <label class="check-item">
                <input type="checkbox" class="monitor-check">
                <div class="check-label">
                    9. 規格強制降級 (Micro Only)
                    <span>合約規格鎖定為 <span class="highlight">MNQ (微型) 1 口</span>。禁止大合約。</span>
                </div>
            </label>

            <label class="check-item">
                <input type="checkbox" class="monitor-check">
                <div class="check-label">
                    10. 硬性停損設定 (Hard Stop & BE)
                    <span>進場與 $100 停損已計算，並承諾獲利時將停損移至保本位(BE)。</span>
                </div>
            </label>
        </div>
    </div>

    <button id="action-btn" disabled>未達完美通關標準</button>
</div>

<script>
    const checks = document.querySelectorAll('.monitor-check');
    const statusLight = document.getElementById('statusLight');
    const actionBtn = document.getElementById('action-btn');
    const counterDisplay = document.getElementById('counter');

    function updateSystemState() {
        const checkedCount = Array.from(checks).filter(c => c.checked).length;
        const totalChecks = checks.length;
        
        counterDisplay.innerText = checkedCount;
        
        if (checkedCount === totalChecks) {
            statusLight.classList.add('green');
            statusLight.innerText = "READY";
            actionBtn.classList.add('active');
            actionBtn.disabled = false;
            actionBtn.innerText = "授權通過：啟動冷酷執行模式";
        } else {
            statusLight.classList.remove('green');
            statusLight.innerText = "LOCKED";
            actionBtn.classList.remove('active');
            actionBtn.disabled = true;
            actionBtn.innerText = `系統鎖定：邏輯補完中 (${checkedCount}/${totalChecks})`;
        }
    }

    checks.forEach(check => {
        check.addEventListener('change', updateSystemState);
    });

    actionBtn.addEventListener('click', () => {
        if (!actionBtn.disabled) {
            alert('【最高指導原則】\n\n你現在是一台機器。不預測、不幻想、不恐懼。\n打到停損就離場，打到停利就收工。\n\n正在為您導向交易平台...');
            window.location.href = "https://trader.tradovate.com/";
        }
    });
</script>

</body>
</html>
