<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Logic Monitor V2 - Hardcore Edition</title>
    <style>
        :root {
            --bg-color: #020617;
            --card-bg: #0f172a;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
            --accent: #38bdf8;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 3rem;
            border-radius: 1.5rem;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            width: 100%;
            max-width: 800px;
            border: 2px solid #1e293b;
        }

        h1 {
            font-size: 2.5rem; /* 字體加大 */
            margin-bottom: 0.5rem;
            text-align: center;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .subtitle {
            text-align: center;
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
        }

        .status-light {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 3rem;
            background-color: var(--danger);
            box-shadow: 0 0 40px var(--danger);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .status-light.green {
            background-color: var(--success);
            box-shadow: 0 0 60px var(--success);
        }

        .check-group {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .check-item {
            display: flex;
            align-items: flex-start;
            gap: 1.25rem;
            padding: 1.5rem;
            background: #1e293b;
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .check-item:hover {
            border-color: var(--accent);
            background: #334155;
        }

        .check-item input {
            width: 2rem; /* Checkbox 加大 */
            height: 2rem;
            margin-top: 0.2rem;
            cursor: pointer;
        }

        .check-label {
            font-size: 1.4rem; /* 字體加大 */
            font-weight: 600;
            line-height: 1.4;
        }

        .check-label span {
            display: block;
            font-size: 1rem;
            color: var(--text-secondary);
            font-weight: normal;
            margin-top: 0.5rem;
        }

        .highlight {
            color: var(--warning);
            font-weight: bold;
        }

        #action-btn {
            width: 100%;
            padding: 1.5rem;
            margin-top: 3rem;
            border-radius: 0.75rem;
            border: none;
            font-weight: 900;
            font-size: 1.5rem; /* 字體加大 */
            cursor: not-allowed;
            background-color: #334155;
            color: #64748b;
            transition: all 0.4s;
        }

        #action-btn.active {
            background-color: var(--success);
            color: white;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(34, 197, 94, 0.4);
        }

        .footer-note {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--danger);
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>EXECUTION MACHINE V2</h1>
    <p class="subtitle">資訊管理碩士邏輯校準中...</p>

    <div id="statusLight" class="status-light">NO GO</div>

    <div class="check-group">
        <!-- 新增：大刻度邊界 -->
        <label class="check-item">
            <input type="checkbox" class="monitor-check">
            <div class="check-label">
                大刻度邊界確認 (Major Scale Boundary)
                <span>確認 60分K 或 4小時K 是否處於支撐/壓力位？不要在中間地帶進行「生理博弈」。</span>
            </div>
        </label>

        <!-- 新增：技術形態 -->
        <label class="check-item">
            <input type="checkbox" class="monitor-check">
            <div class="check-label">
                破底翻 / 回踩機會判定 (Failure to Break Lower & Retest)
                <span>價格是否假突破後迅速拉回？或是突破後已有明確縮量回踩？<span class="highlight">禁止追多追空。</span></span>
            </div>
        </label>

        <label class="check-item">
            <input type="checkbox" class="monitor-check">
            <div class="check-label">
                生理指標監控 (Dopamine Filter)
                <span>心跳 < 80bpm。無興奮感，無報復性念頭。接受 $100 的損失作為系統成本。</span>
            </div>
        </label>

        <label class="check-item">
            <input type="checkbox" class="monitor-check">
            <div class="check-label">
                資產生存線 (Survival Margin)
                <span>今日尚未損失超過 <span class="highlight">$300</span>。確保 70 萬資產安全。</span>
            </div>
        </label>
    </div>

    <button id="action-btn" disabled>等待邏輯同步...</button>

    <div class="footer-note">
        ※ 嚴禁在未達綠燈狀態下開啟 Tradovate。違者視為系統 Bug。
    </div>
</div>

<script>
    const checks = document.querySelectorAll('.monitor-check');
    const statusLight = document.getElementById('statusLight');
    const actionBtn = document.getElementById('action-btn');

    function updateState() {
        const checkedCount = Array.from(checks).filter(c => c.checked).length;
        const allChecked = checkedCount === checks.length;
        
        if (allChecked) {
            statusLight.classList.add('green');
            statusLight.innerText = "READY";
            actionBtn.classList.add('active');
            actionBtn.disabled = false;
            actionBtn.innerText = "准許進入市場 (執行機器模式)";
        } else {
            statusLight.classList.remove('green');
            statusLight.innerText = "NO GO";
            actionBtn.classList.remove('active');
            actionBtn.disabled = true;
            actionBtn.innerText = `邏輯未補完 (${checkedCount}/${checks.length})`;
        }
    }

    checks.forEach(check => {
        check.addEventListener('change', updateState);
    });

    actionBtn.addEventListener('click', () => {
        if (!actionBtn.disabled) {
            alert('系統指令：只看 15 分 K，只交易 MNQ，虧損 $100 必須離場。');
            window.location.href = "https://trader.tradovate.com/";
        }
    });
</script>

</body>
</html>
